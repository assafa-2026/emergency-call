<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>הקפצת כיתת כוננות</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="הקפצה">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #ff4d4d;
        }

        p {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background-color: #2a2a2a;
            color: #ccc;
            border: 1px solid #444;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: none;
            transition: background-color 0.2s;
        }

        .login-box {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            border: 1px solid #333;
            width: 100%;
            box-sizing: border-box;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            text-align: center;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        #mainScreen {
            display: none;
        }

        .fire-btn {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle, #ff3333 0%, #b30000 100%);
            border: 5px solid #ffffff;
            color: white;
            font-size: 28px;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5), inset 0 0 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, box-shadow 0.1s;
            -webkit-tap-highlight-color: transparent;
        }

        .fire-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <button id="settingsBtn" class="settings-btn" onclick="showLoginScreen(true)">⚙️ שינוי הגדרות</button>

    <div class="container">
        <div id="loginScreen" class="login-box">
            <h1>הגדרת כפתור חירום</h1>
            <p>הזן את נתוני המערכת שלכם</p>
            
            <div class="input-group">
                <label>שם מלא (עברית):</label>
                <input type="text" id="userNameInput" placeholder="ישראל ישראלי">
            </div>

            <div class="input-group">
                <label>Application Token (מפתח אפליקציה):</label>
                <input type="text" id="appTokenInput" placeholder="הזן APP TOKEN חדש ותקין">
            </div>
            
            <div class="input-group">
                <label>Group Key (מפתח קבוצה):</label>
                <input type="text" id="groupKeyInput" placeholder="הזן GROUP KEY חדש ותקין">
            </div>
            
            <button class="submit-btn" onclick="saveAndContinue()">שמירה וכניסה</button>
        </div>

        <div id="mainScreen">
            <h1 id="welcomeTitle">כיתת כוננות</h1>
            <p>לחיצה על הכפתור תזניק אזעקת חירום לכולם</p>
            
            <form action="https://api.pushover.net/1/messages.json" method="POST" onsubmit="updateMessageField()">
                <input type="hidden" name="token" id="formAppToken">
                <input type="hidden" name="user" id="formGroupKey">
                <input type="hidden" name="message" id="formMessage">
                <input type="hidden" name="priority" value="2">
                <input type="hidden" name="retry" value="30">
                <input type="hidden" name="expire" value="3600">
                <input type="hidden" name="sound" value="persistent">
                
                <button type="submit" class="fire-btn">הקפצה</button>
            </form>
        </div>
    </div>

    <script>
        var backupName = "";
        var backupAppToken = "";
        var backupGroupKey = "";

        window.onload = function() {
            try {
                var savedName = localStorage.getItem("cc_user_name");
                var savedAppToken = localStorage.getItem("cc_app_token");
                var savedGroupKey = localStorage.getItem("cc_group_key");
                
                if (savedName && savedAppToken && savedGroupKey) {
                    showMainScreen(savedName);
                }
            } catch (e) {}
        };

        function saveAndContinue() {
            var nameInput = document.getElementById("userNameInput").value.trim();
            var appTokenInput = document.getElementById("appTokenInput").value.trim();
            var groupKeyInput = document.getElementById("groupKeyInput").value.trim();

            if (!nameInput || !appTokenInput || !groupKeyInput) {
                alert("חובה למלא את כל השדות כדי להמשיך!");
                return;
            }

            try {
                localStorage.setItem("cc_user_name", nameInput);
                localStorage.setItem("cc_app_token", appTokenInput);
                localStorage.setItem("cc_group_key", groupKeyInput);
            } catch (e) {
                backupName = nameInput;
                backupAppToken = appTokenInput;
                backupGroupKey = groupKeyInput;
            }

            showMainScreen(nameInput);
        }

        function showMainScreen(name) {
            document.getElementById("loginScreen").style.display = "none";
            document.getElementById("mainScreen").style.display = "block";
            document.getElementById("settingsBtn").style.display = "block";
            document.getElementById("welcomeTitle").innerText = "שלום, " + name;
        }

        function showLoginScreen(isManualClick) {
            if (isManualClick) {
                try {
                    document.getElementById("userNameInput").value = localStorage.getItem("cc_user_name") || backupName;
                    document.getElementById("appTokenInput").value = localStorage.getItem("cc_app_token") || backupAppToken;
                    document.getElementById("groupKeyInput").value = localStorage.getItem("cc_group_key") || backupGroupKey;
                } catch (e) {}
            }
            document.getElementById("mainScreen").style.display = "none";
            document.getElementById("settingsBtn").style.display = "none";
            document.getElementById("loginScreen").style.display = "block";
        }

        function updateMessageField() {
            var currentName = "משתמש";
            var appToken = "";
            var groupKey = "";

            try {
                currentName = localStorage.getItem("cc_user_name") || backupName || "משתמש";
                appToken = localStorage.getItem("cc_app_token") || backupAppToken;
                groupKey = localStorage.getItem("cc_group_key") || backupGroupKey;
            } catch (e) {
                currentName = backupName || "משתמש";
                appToken = backupAppToken;
                groupKey = backupGroupKey;
            }

            // הזנת הנתונים הפרטיים שהמשתמש שמר לתוך הטופס רגע לפני המשלוח
            document.getElementById("formAppToken").value = appToken;
            document.getElementById("formGroupKey").value = groupKey;
            document.getElementById("formMessage").value = "*** הקפצת חירום *** | הופעל על ידי: " + currentName;
        }
    </script>

</body>
</html>
